---
# Zabbix agent2 from the official Zabbix apt repo (arm64 supported on 7.x).
# Switched away from Debian backports - see defaults/main.yml for the rationale.

- name: Remove any old Zabbix sources from previous runs (renames + URL changes)
  ansible.builtin.shell:
    cmd: rm -f /etc/apt/sources.list.d/zabbix*.list
  changed_when: false

- name: Download zabbix-release .deb (registers the official Zabbix apt repo)
  ansible.builtin.get_url:
    url: "{{ zabbix_agent_release_deb_url }}"
    dest: /tmp/zabbix-release.deb
    mode: "0644"

- name: Install zabbix-release
  ansible.builtin.apt:
    deb: /tmp/zabbix-release.deb

- name: Install zabbix-agent2
  ansible.builtin.apt:
    name: zabbix-agent2
    state: present
    update_cache: true

- name: Stop zabbix-agent2 before config deployment
  ansible.builtin.systemd:
    name: zabbix-agent2
    state: stopped
  failed_when: false
  changed_when: false

- name: Configure Zabbix agent2
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
    owner: root
    group: root
    mode: "0644"

- name: UFW - allow Zabbix agent passive checks
  community.general.ufw:
    rule: allow
    port: "{{ zabbix_agent_listen_port }}"
    proto: tcp

- name: Enable and start Zabbix agent2
  ansible.builtin.systemd:
    name: zabbix-agent2
    enabled: true
    state: started

- name: Clean up downloaded release deb
  ansible.builtin.file:
    path: /tmp/zabbix-release.deb
    state: absent
