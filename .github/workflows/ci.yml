---
name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs for the same ref when a newer commit arrives.
# Saves runner minutes and avoids ambiguous "which run is authoritative" UI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint code and configs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install Python tools
        run: pip install -r .devcontainer/requirements.txt
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
      - name: Install hadolint
        run: |
          curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-linux-x86_64
          chmod +x /usr/local/bin/hadolint
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  vault:
    name: Verify SOPS-managed files are encrypted
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Check for unencrypted secrets
        run: ./scripts/check-vault-encrypted.sh

  docs:
    name: Check documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --no-progress
            --exclude-path .devcontainer
            --accept 200,204,301,302,307,308,403,429
            --timeout 60
            --max-retries 5
            --retry-wait-time 5
            '**/*.md'

  security:
    name: Security scans
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Cache Trivy vulnerability DB
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db-v0
          restore-keys: |
            ${{ runner.os }}-trivy-db-

      # Install trivy directly instead of via aquasecurity/trivy-action.
      # Removes a third-party action dependency, and lets Renovate pin
      # the binary version we actually care about. The trivy-action tags
      # are erratic; the underlying CLI tags are not.
      - name: Install Trivy
        # renovate: datasource=github-releases depName=aquasecurity/trivy
        env:
          TRIVY_VERSION: "0.70.0"
        run: |
          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar xz -C /usr/local/bin trivy

      - name: Scan for vulnerabilities and misconfigurations
        # NB: don't `--skip-dirs .devcontainer` here. This repo is config-
        # as-code (Ansible); the devcontainer is the only Trivy-scannable
        # surface — Dockerfile + requirements.txt. Skipping it makes the
        # whole run a no-op. Treat the devcontainer as supply chain.
        run: >-
          trivy fs --scanners vuln,misconfig
          --severity HIGH,CRITICAL --exit-code 1 .

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
